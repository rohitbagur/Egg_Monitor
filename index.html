<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Egg IoT Dashboard - Live Integration</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>🥚 Smart Egg Monitor <span class="badge">IoT Live Feed</span></h1>
    </header>

    <main class="dashboard">
        <section class="stats">
            <div class="card"><h3>Total Produced</h3><p id="total-count">0</p></div>
            <div class="card"><h3>Avg Weight</h3><p id="avg-weight">0g</p></div>
            <div class="card"><h3>Last Status</h3><p id="status" style="color:green">Connected</p></div>
        </section>

        <section class="feed">
            <h2>Live Collection Feed</h2>
            <table id="egg-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Weight (g)</th>
                        <th>Grade</th>
                        <th>Egg Scan</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
